# Example ClusterRole for the cascading-rbac demo. Apply it into a consumer
# workspace (e.g. root:orgs:e2e:consumer) to have something to show in the
# portal's read-only "Cluster Roles" view, and as a candidate resource to
# reference from a Cascade.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: example-configmap-viewer
  labels:
    app.kubernetes.io/part-of: cascading-rbac-demo
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["demo-config"]
    verbs: ["update", "patch"]
