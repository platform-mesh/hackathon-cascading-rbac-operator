# Binds the fleet.platform-mesh.io APIExport into a consumer workspace. The
# export lives in the provider workspace (see config/resources and the README);
# in the portal this binding is created for you when you install the provider
# from the marketplace.
apiVersion: apis.kcp.io/v1alpha2
kind: APIBinding
metadata:
  name: fleet.platform-mesh.io
spec:
  reference:
    export:
      path: root:orgs:e2e:cascade-provider
      name: fleet.platform-mesh.io
