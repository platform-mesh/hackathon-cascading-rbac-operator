# ProviderMetadata: advertises the fleet.platform-mesh.io APIExport in the
# Platform Mesh portal marketplace so it can be bound from the UI. Binding it
# into an account creates the APIBinding that makes the Cascade resource (and,
# via the content-for label, the Cascades nav node from
# contentconfiguration-cascades.yaml) available in that account.
#
# metadata.name MUST equal the APIExport name (fleet.platform-mesh.io).
#
# Placement: apply this to root:platform-mesh-system, which serves the
# ui.platform-mesh.io API (via the core.platform-mesh.io APIExport) alongside the
# ContentConfigurations. Note this differs from the e2e providers, whose
# ProviderMetadata is co-located with its APIExport in the provider account; the
# fleet APIExport lives in the kcp `root` workspace (which does not serve
# ui.platform-mesh.io), so the two are intentionally not co-located here. The
# marketplace bind action must therefore resolve the export at path `root`.
apiVersion: ui.platform-mesh.io/v1alpha1
kind: ProviderMetadata
metadata:
  name: fleet.platform-mesh.io
spec:
  displayName: Cascading RBAC (Hackathon)
  description: |
    Hackathon proof-of-concept that cascades a referenced resource (for example a
    ClusterRole) from a source workspace into its descendant workspaces via the
    Cascade API. Bind this export to author Cascade resources in your account.
  contacts:
    - displayName: Platform Mesh Hackathon
      email: e2e@platform-mesh.test
      role:
        - Maintainer
  icon:
    light:
      data: "data:image/svg+xml;base64,"
    dark:
      data: "data:image/svg+xml;base64,"
