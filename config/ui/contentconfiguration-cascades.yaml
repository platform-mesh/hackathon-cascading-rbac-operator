# ContentConfiguration: renders Cascade (fleet.platform-mesh.io/v1alpha1) in the
# Platform Mesh portal using the built-in generic-list-view web component (no
# separate micro-frontend). Pattern from
# github.com/platform-mesh/example-api-extraction.
#
# metadata.labels.ui.platform-mesh.io/content-for MUST equal the APIExport name
# (fleet.platform-mesh.io, see config/resources/apiexport-fleet.platform-mesh.io.yaml)
# so the portal projects this node into accounts that bound that APIExport. The
# generic-list-view is list + create: you land on a Cascades table with a Create
# button, so this is where you author a Cascade.
#
# GraphQL identifiers are the underscored form of the API group
# (fleet.platform-mesh.io -> fleet_platform_mesh_io).
apiVersion: ui.platform-mesh.io/v1alpha1
kind: ContentConfiguration
metadata:
  name: cascades-ui
  labels:
    ui.platform-mesh.io/entity: core_platform-mesh_io_account
    ui.platform-mesh.io/content-for: fleet.platform-mesh.io
spec:
  inlineConfiguration:
    contentType: json
    content: |-
      {
        "name": "cascades",
        "luigiConfigFragment": {
          "data": {
            "nodes": [
              {
                "pathSegment": "fleet_platform_mesh_io_cascades",
                "navigationContext": "fleet_platform_mesh_io_cascades",
                "label": "Cascades",
                "icon": "org-chart",
                "order": 870,
                "category": { "id": "hackathon", "isGroup": true, "label": "HACKATHON", "icon": "org-chart", "order": 900 },
                "entityType": "main.core_platform-mesh_io_account",
                "keepSelectedForChildren": true,
                "url": "/assets/platform-mesh-portal-ui-wc.js#generic-list-view",
                "webcomponent": { "selfRegistered": true },
                "context": {
                  "resourceDefinition": {
                    "apiGroup": "fleet_platform_mesh_io",
                    "version": "v1alpha1",
                    "entity": "Cascade",
                    "entityCollection": "Cascades",
                    "scope": "Cluster",
                    "namespace": null,
                    "ui": {
                      "listView": {
                        "fields": [
                          { "label": "Name",      "property": "metadata.name" },
                          { "label": "Kind",      "property": "spec.gvk.kind" },
                          { "label": "Resource",  "property": "spec.name" },
                          { "label": "Max Depth", "property": "spec.maxDepth" }
                        ]
                      },
                      "detailView": {
                        "fields": [
                          { "label": "Name",          "property": "metadata.name" },
                          { "label": "Group",         "property": "spec.gvk.group" },
                          { "label": "Version",       "property": "spec.gvk.version" },
                          { "label": "Kind",          "property": "spec.gvk.kind" },
                          { "label": "Resource Name", "property": "spec.name" },
                          { "label": "Namespace",     "property": "spec.namespace" },
                          { "label": "Max Depth",     "property": "spec.maxDepth" }
                        ]
                      },
                      "createView": {
                        "fields": [
                          { "label": "Name",    "property": "metadata.name",    "required": true },
                          { "label": "Group",   "property": "spec.gvk.group",   "required": true, "values": ["rbac.authorization.k8s.io"] },
                          { "label": "Version", "property": "spec.gvk.version", "required": true, "values": ["v1"] },
                          { "label": "Kind",    "property": "spec.gvk.kind",    "required": true, "values": ["ClusterRole"] },
                          {
                            "label": "Resource Name",
                            "property": "spec.name",
                            "required": true,
                            "dynamicValuesDefinition": {
                              "operation": "rbac_authorization_k8s_io.v1.ClusterRoles.items",
                              "gqlQuery": "query { rbac_authorization_k8s_io { v1 { ClusterRoles { items { metadata { name } } } } } }",
                              "value": "metadata.name",
                              "key": "metadata.name"
                            }
                          },
                          { "label": "Namespace", "property": "spec.namespace" },
                          { "label": "Max Depth", "property": "spec.maxDepth", "required": true }
                        ]
                      }
                    }
                  }
                },
                "children": [
                  {
                    "pathSegment": ":cascadeId",
                    "hideFromNav": true,
                    "keepSelectedForChildren": false,
                    "url": "/assets/platform-mesh-portal-ui-wc.js#generic-detail-view",
                    "webcomponent": { "selfRegistered": true },
                    "defineEntity": {
                      "id": "fleet_platform_mesh_io_cascade",
                      "contextKey": "cascadeId"
                    },
                    "context": {
                      "resourceId": ":cascadeId"
                    }
                  }
                ]
              }
            ],
            "texts": [
              { "locale": "",   "textDictionary": { "cascades": "Cascades" } },
              { "locale": "en", "textDictionary": { "cascades": "Cascades" } }
            ]
          }
        }
      }
