# APIExportEndpointSlice for the fleet.platform-mesh.io APIExport. Its
# status.endpoints URL is the virtual-workspace the operator connects to
# (main.go: apiexport.New(fleetCfg, "fleet.platform-mesh.io", ...)) to watch
# Cascade objects across every workspace that binds the export.
#
# Applied into the provider workspace (cascade-provider), co-located with the
# APIExport. The operator's fleet provider is pointed at this workspace via
# main.go's `fleetWorkspace` constant, and watches for a slice of this name here.
# (kcp auto-creates an equivalent default slice next to the APIExport; applying
# this manifest just makes it explicit.) The slice publishes its URL only once
# >=1 APIBinding to the export exists — the self-binding provides that.
#
# If you host the provider stack elsewhere, update both spec.export.path here and
# the `fleetWorkspace` constant in main.go to match.
apiVersion: apis.kcp.io/v1alpha1
kind: APIExportEndpointSlice
metadata:
  name: fleet.platform-mesh.io
spec:
  export:
    name: fleet.platform-mesh.io
    path: root:orgs:e2e:cascade-provider
